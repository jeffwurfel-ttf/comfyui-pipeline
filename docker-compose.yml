# =============================================================================
# ComfyUI Pipeline Service — Rocky Linux Deployment
# =============================================================================
#
# Server: rocky-gpu01 (10.10.210.80), user: jeffw
# Storage: /mnt/ssd (1TB SSD) for all models, input, output
# Symlinks: ~/comfyui-models -> /mnt/ssd/comfyui-models (etc)
#
# First-time setup:
#   1. Copy .env.example to .env, set HF_TOKEN
#   2. Run ./bootstrap.sh to create dirs and download models
#   3. docker compose up -d --build
#
# Rebuild after Dockerfile changes:
#   docker compose up -d --build
#
# Logs:
#   docker compose logs -f
# =============================================================================

services:
  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
    image: comfyui-pipeline:latest
    container_name: comfyui-pipeline

    ports:
      - "8188:8188"
      - "8189:8189"

    environment:
      - COMFYUI_LISTEN=0.0.0.0
      - COMFYUI_PORT=8188
      - COMFYUI_MODELS_PATH=/models
      - WRAPPER_PORT=8189
      - WORKFLOWS_DIR=/app/workflows
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - CHECK_MODELS=true
      - AUTODOWNLOAD_MODELS=false
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/models/.hf_cache

    volumes:
      # Models — SSD via symlink (~/comfyui-models -> /mnt/ssd/comfyui-models)
      - ${COMFY_MODELS_HOST:-/mnt/ssd/comfyui-models}:/models

      # Workflows
      - ./workflows:/app/workflows:ro

      # Output/Input — SSD via symlink
      - ${COMFY_OUTPUT_HOST:-/mnt/ssd/comfyui-output}:/app/ComfyUI/output
      - ${COMFY_INPUT_HOST:-/mnt/ssd/comfyui-input}:/app/ComfyUI/input

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8189/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  default:
    name: ai-network
    external: true