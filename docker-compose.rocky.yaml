# =============================================================================
# ComfyUI Pipeline Service — Rocky Linux Deployment
# =============================================================================
#
# Server: rocky-gpu01 (10.10.210.80), user: jeffw
# Models: ~/comfyui-models (on /home partition, 154G)
#
# Usage:
#   docker-compose -f docker-compose.rocky.yaml up -d
#   docker-compose -f docker-compose.rocky.yaml logs -f
#   docker-compose -f docker-compose.rocky.yaml down
#
# Rebuild after Dockerfile changes:
#   docker build -t comfyui-pipeline:latest .
#   docker-compose -f docker-compose.rocky.yaml up -d --force-recreate
# =============================================================================

services:
  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
    image: comfyui-pipeline:latest
    container_name: comfyui-pipeline

    ports:
      - "8188:8188"
      - "8189:8189"

    environment:
      - COMFYUI_LISTEN=0.0.0.0
      - COMFYUI_PORT=8188
      - COMFYUI_MODELS_PATH=/models
      - WRAPPER_PORT=8189
      - WORKFLOWS_DIR=/app/workflows
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - CHECK_MODELS=true
      - AUTODOWNLOAD_MODELS=false
      - HF_TOKEN=${HF_TOKEN:-}

    volumes:
      # Models — single source of truth on /home (more space)
      # Dockerfile symlinks /app/ComfyUI/models -> /models
      - /home/jeffw/comfyui-models:/models

      # Workflows
      - ./workflows:/app/workflows:ro

      # Output/Input
      - /home/jeffw/comfyui-output:/app/ComfyUI/output
      - /home/jeffw/comfyui-input:/app/ComfyUI/input

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8189/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  default:
    name: ai-network
    external: true